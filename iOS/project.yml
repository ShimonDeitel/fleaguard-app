name: Fleaguard
options:
  bundleIdPrefix: com.shimondeitel.fleatrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fleaguard:
    type: application
    platform: iOS
    sources:
      - path: Fleaguard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fleatrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fleaguard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FleaguardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FleaguardTests
      - path: Fleaguard.storekit
    dependencies:
      - target: Fleaguard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fleatrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FleaguardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FleaguardUITests
    dependencies:
      - target: Fleaguard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fleatrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fleaguard:
    build:
      targets:
        Fleaguard: all
        FleaguardTests: [test]
        FleaguardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fleaguard.storekit
    test:
      config: Debug
      storeKitConfiguration: Fleaguard.storekit
      targets:
        - FleaguardTests
        - FleaguardUITests
    archive:
      config: Release
